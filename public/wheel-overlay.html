<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:transparent;
    width:100vw; height:100vh;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    font-family:'Tajawal',sans-serif; overflow:hidden;
  }
  /* Mobile mode */
  body.mobile { transform:scale(0.55); transform-origin:center center; }

  /* Registration banner - glass HUD */
  #reg-banner {
    display:none;
    background:rgba(10,12,22,.72);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(245,158,11,.45);
    border-radius:20px;
    padding:16px 28px;
    color:#fff;
    font-size:20px;
    font-weight:900;
    text-align:center;
    min-width:280px;
    margin-bottom:24px;
    box-shadow:0 22px 50px -18px rgba(0,0,0,.75), 0 0 36px -12px rgba(245,158,11,.45);
  }

  .wheel-wrap {
    position:relative; display:flex;
    flex-direction:column; align-items:center; gap:16px;
  }

  /* Pointer */
  .pointer {
    position:absolute; top:-20px; left:50%; transform:translateX(-50%);
    width:0; height:0;
    border-left:16px solid transparent;
    border-right:16px solid transparent;
    border-top:36px solid #f59e0b;
    z-index:10;
    filter:drop-shadow(0 4px 12px rgba(245,158,11,.65));
  }

  canvas { border-radius:50%; box-shadow:0 0 0 6px rgba(10,12,22,.72), 0 0 60px -14px rgba(6,182,212,.5); }

  /* Winner popup - glass gold */
  #winner-popup {
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    z-index:100; opacity:0; pointer-events:none;
    transition:opacity .5s;
    background:transparent;
  }
  #winner-popup.show { opacity:1; }
  .winner-card {
    background:rgba(16,12,4,.78);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(245,158,11,.55);
    border-radius:28px; padding:36px 52px; text-align:center;
    box-shadow:0 0 65px -14px rgba(245,158,11,.6), inset 0 0 45px -25px rgba(245,158,11,.45);
    animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from{transform:scale(0) rotate(-10deg)} to{transform:scale(1) rotate(0)} }
  .winner-avatar-wrap { margin-bottom:14px; }
  .winner-avatar { width:90px; height:90px; border-radius:50%; border:4px solid #f59e0b; object-fit:cover; box-shadow:0 0 28px -6px rgba(245,158,11,.7); }
  .winner-avatar-placeholder {
    width:90px; height:90px; border-radius:50%; border:4px solid #f59e0b;
    background:rgba(255,255,255,.06); display:flex; align-items:center; justify-content:center;
    font-size:36px; font-weight:900; color:#fde68a; margin:0 auto;
  }
  .winner-label { font-size:16px; color:rgba(255,255,255,.55); margin-bottom:8px; }
  .winner-name  { font-size:32px; font-weight:900; background:linear-gradient(180deg,#fde68a,#f59e0b); -webkit-background-clip:text; background-clip:text; color:transparent; }

  /* Confetti */
  .confetti-piece {
    position:fixed; width:10px; height:10px; border-radius:2px;
    animation:confettiFall linear forwards;
    pointer-events:none; z-index:200;
  }
  @keyframes confettiFall {
    0%   { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(105vh) rotate(720deg); opacity:0; }
  }

  /* Waiting state */
  #waiting {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,.3); font-size:18px;
  }
</style>
</head>
<body>

<div id="waiting">في انتظار الدوران...</div>

<div id="reg-banner">
  <div style="font-size:14px;color:#ffd700;margin-bottom:6px">📝 التسجيل مفتوح</div>
  <div><span id="reg-count" style="color:#0891b2;font-size:24px">0</span> مشارك</div>
  <div id="reg-timer" style="display:none;font-size:28px;color:#ffd700;margin-top:6px">00:00</div>
  <div id="reg-keyword" style="font-size:13px;color:#aaa;margin-top:4px">اكتب <strong style="color:#fff" id="reg-kw-text">اشتراك</strong> للمشاركة</div>
</div>

<div class="wheel-wrap" id="wheel-wrap" style="display:none">
<div class="pointer"></div>
  <canvas id="wheel-canvas" width="500" height="500"></canvas>
</div>

<div id="winner-popup">
  <div class="winner-card">
    <div class="winner-avatar-wrap" id="winner-av"></div>
    <div class="winner-name" id="winner-name"></div>
  </div>
</div>

<script>
const params   = new URLSearchParams(location.search);
let username = params.get('username') || '';
const authKey  = params.get('key') || '';
const __auth = (function(){ var p = new URLSearchParams(location.search); return { key: p.get('key')||'', pw: p.get('pw')||'' }; })();
const socket   = io({ auth: __auth, transports:['websocket','polling'], upgrade:true, reconnection:true, reconnectionDelay:500, reconnectionDelayMax:3000, reconnectionAttempts:Infinity, timeout:10000, withCredentials:false });

// auto-rejoin: يضمن انضمام الأوفرلاي لقناة البث فوراً بعد كل اتصال/إعادة اتصال
socket.on('connect', function() {
  try { if (typeof username !== 'undefined' && username) socket.emit('join', { username: username }); } catch(e){}
});
socket.io.on('reconnect', function() {
  try { if (typeof username !== 'undefined' && username) socket.emit('join', { username: username }); } catch(e){}
});


// Mobile mode
if (params.get('mobile') === '1' || params.get('mobile') === 'true') {
  document.body.classList.add('mobile');
}

// If key provided but no username, resolve from server
if (!username && authKey) {
  fetch('/api/resolve-key?key=' + encodeURIComponent(authKey))
    .then(r => r.json())
    .then(data => {
      if (data.ok && data.username) {
        username = data.username;
        socket.emit('join', { username });
        loadWheelState();
      } else if (data.ok && data.connectedRooms && data.connectedRooms.length > 0) {
        username = data.connectedRooms[0];
        socket.emit('join', { username });
        loadWheelState();
      }
    })
    .catch(() => {});
}
const canvas   = document.getElementById('wheel-canvas');
const ctx      = canvas.getContext('2d');

const COLORS = [
  '#ff0050','#0891b2','#ffd700','#1dba72','#a57afa',
  '#f59e0b','#3b82f6','#ec4899','#10b981','#f97316',
];

let entries     = [];
let currentAngle = 0;
let spinning     = false;
let regTimer     = null;
let regEndTime   = 0;
let accepting    = false;
let wheelTextColor = '#fff';
let wheelPointerColor = '#ffd700';

// Load existing entries
function loadWheelState() {
  if (!username) return;
  fetch(`/api/wheel/${username}`).then(r => r.json()).then(data => {
    if (data.accepting) {
      accepting = true;
      regEndTime = data.regEndTime || 0;
      showRegBanner(data.keyword || 'اشتراك', data.count || 0);
    }
    entries = data.entries || [];
    if (entries.length > 0) {
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('wheel-wrap').style.display = 'flex';
      drawWheel(currentAngle);
    }
  });
}

if (username) {
  socket.emit('join', { username });
  loadWheelState();
}

// Receive entries updates (لحظي)
socket.on('wheel:update', ({ entries: e }) => {
  entries = e || [];
  document.getElementById('reg-count').textContent = entries.length;
  if (entries.length > 0) {
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('wheel-wrap').style.display = 'flex';
    drawWheel(currentAngle);
  } else {
    document.getElementById('waiting').style.display = 'flex';
    document.getElementById('wheel-wrap').style.display = 'none';
  }
});

// Live config updates
socket.on('wheel:config', (cfg) => {
  if (cfg.colors && Array.isArray(cfg.colors)) COLORS.splice(0, COLORS.length, ...cfg.colors);
  if (cfg.textColor) wheelTextColor = cfg.textColor;
  if (cfg.pointerColor) { document.querySelector('.pointer').style.borderTopColor = cfg.pointerColor; wheelPointerColor = cfg.pointerColor; }
  if (entries.length > 0) drawWheel(currentAngle);
});

socket.on('wheel:registration', ({ accepting: a, endTime, keyword, count }) => {
  accepting = a;
  regEndTime = endTime || 0;
  if (a) {
    showRegBanner(keyword || 'اشتراك', count || entries.length || 0);
  } else {
    hideRegBanner();
  }
});

function showRegBanner(keyword, count) {
  document.getElementById('reg-banner').style.display = 'block';
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('reg-kw-text').textContent = keyword;
  document.getElementById('reg-count').textContent = count;
  if (regEndTime > 0) {
    document.getElementById('reg-timer').style.display = 'block';
    startRegTimer();
  } else {
    document.getElementById('reg-timer').style.display = 'none';
  }
}

function hideRegBanner() {
  document.getElementById('reg-banner').style.display = 'none';
  if (entries.length === 0) document.getElementById('waiting').style.display = 'flex';
  if (regTimer) { clearInterval(regTimer); regTimer = null; }
}

function startRegTimer() {
  if (regTimer) clearInterval(regTimer);
  updateRegTimer();
  regTimer = setInterval(updateRegTimer, 200);
}

function updateRegTimer() {
  const remainMs = Math.max(0, regEndTime - Date.now());
  const sec = Math.ceil(remainMs / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  const el = document.getElementById('reg-timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.style.color = sec <= 10 ? '#ff0050' : '#ffd700';
  if (remainMs <= 0) {
    clearInterval(regTimer);
    regTimer = null;
  }
}

// Receive spin command
socket.on('wheel:spin', ({ winner, winnerIndex, duration, speed, entries: e }) => {
  entries = e || entries;
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('wheel-wrap').style.display = 'flex';
  doSpin(winner, winnerIndex, duration || 5000, speed || 'normal');
});

function doSpin(winner, winnerIndex, duration, speed) {
  if (spinning) return;
  spinning = true;

  const spinsPerSecond = speed === 'fast' ? 3 : speed === 'slow' ? 0.8 : 1.5;
  const totalSeconds   = duration / 1000;
  const numFullSpins   = Math.floor(spinsPerSecond * totalSeconds);

  const slice = (Math.PI * 2) / entries.length;

  // الزاوية النهائية المطلوبة بحيث منتصف قطعة الفائز تحت السهم (-π/2)
  const wantedFinal = -Math.PI / 2 - winnerIndex * slice - slice / 2;

  // ابدأ من الزاوية الحالية واضف عدد دورات كاملة + اذهب للزاوية المطلوبة
  const startAngle = currentAngle;
  // finalAngle = wantedFinal + n*2π حيث n كافي لـ extraSpins
  const finalAngle = wantedFinal + Math.ceil((startAngle - wantedFinal) / (Math.PI * 2) + numFullSpins) * Math.PI * 2;

  const totalAngle = finalAngle - startAngle;

  const startTime = performance.now();
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed  = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    currentAngle   = startAngle + totalAngle * easeOut(progress);
    drawWheel(currentAngle);
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = finalAngle; // ضمان الدقة في النهاية
      drawWheel(currentAngle);
      spinning = false;
      const ptrRelative = ((-Math.PI / 2) - currentAngle % (Math.PI * 2) + Math.PI * 4) % (Math.PI * 2);
      const actualIdx = Math.floor(ptrRelative / slice) % entries.length;
      console.log(`[Wheel] Expected: ${winner.name} (${winnerIndex}), Actual: ${entries[actualIdx]?.name} (${actualIdx})`);
      showWinner(winner);
    }
  }

  requestAnimationFrame(animate);
}

drawWheel(currentAngle);
function drawWheel(angle) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r  = cx - 8;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!entries.length) return;

  const slice = (Math.PI * 2) / entries.length;

  entries.forEach((entry, i) => {
    const start = angle + i * slice;
    const end   = start + slice;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${entries.length > 20 ? 13 : entries.length > 10 ? 15 : 17}px Tajawal`;
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    const name = entry.name.length > 12 ? entry.name.slice(0,12)+'…' : entry.name;
    ctx.fillText(name, r - 14, 5);
    ctx.restore();
  });

  // Center
  ctx.beginPath();
  ctx.arc(cx, cy, 30, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd700';
  ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.stroke();
}

// ── Spin ──────────────────────────────────────────────────

function showWinner(winner) {
  const av = document.getElementById('winner-av');
  if (winner.avatar) {
    av.innerHTML = `<img class="winner-avatar" src="${winner.avatar}" onerror="this.outerHTML='<div class=winner-avatar-placeholder>${winner.name[0]}</div>'">`;
  } else {
    av.innerHTML = `<div class="winner-avatar-placeholder">${winner.name[0]}</div>`;
  }
  document.getElementById('winner-name').textContent = winner.name;
  document.getElementById('winner-popup').classList.add('show');
  launchConfetti();
  setTimeout(() => document.getElementById('winner-popup').classList.remove('show'), 6000);
}

function launchConfetti() {
  const colors = ['#ff0050','#0891b2','#ffd700','#1dba72','#a57afa','#f59e0b'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${2+Math.random()*2}s;
      animation-delay:${Math.random()*0.5}s;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

drawWheel(currentAngle);
</script>
</body>
</html>
