<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="rgba(0,0,0,0)">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
/* 🔥 حل قطعي لشاشة سوداء في TikTok LIVE Studio - شفافية مضمونة */
html, body { background: transparent !important; background-color: rgba(0,0,0,0) !important; }
:root { color-scheme: light dark; }
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:transparent; width:100vw; height:100vh; font-family:'Tajawal',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }
body.mobile{transform:scale(0.55);transform-origin:center center;}
#container { display:none; flex-direction:column; align-items:center; gap:16px; }
.title-bar { background: rgba(0,0,0,.92); border:1px solid rgba(245,158,11,.45); border-radius:18px; padding:12px 28px; color:#fde68a; font-size:18px; font-weight:900; text-align:center; box-shadow:0 18px 44px -16px rgba(0,0,0,.7), 0 0 30px -12px rgba(245,158,11,.4); }
.letters { display:flex; gap:10px; direction:rtl; flex-wrap:wrap; justify-content:center; }
.letter { width:56px; height:64px; background: rgba(0,0,0,.92); border:1px solid rgba(255,255,255,.16); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; color:rgba(255,255,255,.3); transition:all .4s; box-shadow:0 12px 28px -14px rgba(0,0,0,.7); }
.letter.revealed { border-color:rgba(16,185,129,.65); color:#34d399; background:rgba(16,185,129,.14); box-shadow:0 0 24px -8px rgba(16,185,129,.6); animation:revealPop .4s ease; }
@keyframes revealPop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
.hint-bar { background: rgba(0,0,0,.92); border:1px solid rgba(6,182,212,.4); border-radius:14px; padding:9px 22px; color:#22d3ee; font-size:15px; max-width:500px; text-align:center; box-shadow:0 14px 34px -14px rgba(0,0,0,.7); }
#winner-popup { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .5s; }
#winner-popup.show { opacity:1; }
.winner-card { background: rgba(0,0,0,.92); border:1px solid rgba(245,158,11,.55); border-radius:28px; padding:36px 52px; text-align:center; box-shadow:0 0 65px -14px rgba(245,158,11,.6), inset 0 0 45px -25px rgba(245,158,11,.45); animation:popIn .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
.winner-label { font-size:16px; color:rgba(255,255,255,.55); margin-bottom:8px; }
.winner-name { font-size:32px; font-weight:900; background:linear-gradient(180deg,#fde68a,#f59e0b); -webkit-background-clip:text; background-clip:text; color:transparent; }
.winner-word { font-size:18px; color:#34d399; margin-top:8px; }
.confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; animation:confettiFall linear forwards; pointer-events:none; z-index:200; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }
50%{opacity:.35} }
</style>
<script>
// 🔥 فرض شفافية HTML/body في TikTok LIVE Studio WebView
(function(){
  var setTransparent = function(){
    document.documentElement.style.background = 'transparent';
    document.documentElement.style.backgroundColor = 'rgba(0,0,0,0)';
    if(document.body){
      document.body.style.background = 'transparent';
      document.body.style.backgroundColor = 'rgba(0,0,0,0)';
    }
  };
  setTransparent();
  document.addEventListener('DOMContentLoaded', setTransparent);
  window.addEventListener('load', setTransparent);
})();
</script>
</head>
<body>
<div id="container">
<div class="title-bar">🔐 كلمة السر</div>
  <div class="letters" id="letters"></div>
  <div class="hint-bar" id="hint-bar" style="display:none"></div>
</div>
<div id="winner-popup">
  <div class="winner-card">
    <div class="winner-label">🏆 الفائز</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-word" id="winner-word"></div>
  </div>
</div>
<script>
if(new URLSearchParams(location.search).get("mobile")==="1")document.body.classList.add("mobile");
const params = new URLSearchParams(location.search);
let username = params.get('username') || '';
const authKey = params.get('key') || '';
const __auth = (function(){ var p = new URLSearchParams(location.search); return { key: p.get('key')||'', pw: p.get('pw')||'' }; })();
const socket = io({ auth: __auth, transports:['websocket','polling'], upgrade:true, reconnection:true, reconnectionDelay:500, reconnectionDelayMax:3000, reconnectionAttempts:Infinity, timeout:10000, withCredentials:false });

// auto-rejoin: يضمن انضمام الأوفرلاي لقناة البث فوراً بعد كل اتصال/إعادة اتصال
socket.on('connect', function() {
  try { if (typeof username !== 'undefined' && username) socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw }); } catch(e){}
});
socket.io.on('reconnect', function() {
  try { if (typeof username !== 'undefined' && username) socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw }); } catch(e){}
});


if (!username && authKey) {
  fetch('/api/resolve-key?key=' + encodeURIComponent(authKey)).then(r=>r.json()).then(data => {
    if (data.ok && data.username) { username = data.username; socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw }); loadState(); }
    else if (data.ok && data.connectedRooms?.length) { username = data.connectedRooms[0]; socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw }); loadState(); }
  });
} else if (username) { socket.emit('join', { username: username, key: __auth.key, pw: __auth.pw }); loadState(); }

function loadState() {
  fetch(_api(`/api/password/${username}`)).then(r=>r.json()).then(data => {
    if (data.length > 0) { document.getElementById('container').style.display='flex'; renderLetters(data.letters, data.revealed); renderHint(data.hints); }
  });
}

socket.on('password:update', (data) => {
  document.getElementById('container').style.display = 'flex';
  renderLetters(data.letters, data.revealed);
  renderHint(data.hints);
});

socket.on('password:winner', ({ winner, word }) => {
  document.getElementById('winner-name').textContent = winner.name;
  document.getElementById('winner-word').textContent = '✅ ' + word;
  document.getElementById('winner-popup').classList.add('show');
  launchConfetti();
  setTimeout(() => document.getElementById('winner-popup').classList.remove('show'), 6000);
});

function renderLetters(letters, revealed) {
  document.getElementById('letters').innerHTML = letters.map((l, i) =>
    `<div class="letter ${revealed[i]?'revealed':''}">${l==='_'?'؟':l}</div>`
  ).join('');
}

function renderHint(hints) {
  const bar = document.getElementById('hint-bar');
  if (hints && hints.length > 0) { bar.style.display='block'; bar.textContent='💡 '+hints[hints.length-1]; }
  else { bar.style.display='none'; }
}

function launchConfetti() {
  const colors = ['#ff0050','#0891b2','#ffd700','#1dba72','#a57afa','#f59e0b'];
  for (let i=0; i<60; i++) {
    const el = document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),4000);
  }
}
</script>
</body>
</html>
