<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:transparent; width:100vw; height:100vh; font-family:'Tajawal',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }
#container { display:none; flex-direction:column; align-items:center; gap:16px; }
.title-bar { background:rgba(0,0,0,.85); border:2px solid rgba(255,215,0,.4); border-radius:16px; padding:10px 24px; color:#ffd700; font-size:18px; font-weight:900; text-align:center; }
.letters { display:flex; gap:10px; direction:ltr; flex-wrap:wrap; justify-content:center; }
.letter { width:56px; height:64px; background:rgba(0,0,0,.8); border:2px solid rgba(255,255,255,.2); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; color:#555; transition:all .4s; }
.letter.revealed { border-color:#1dba72; color:#1dba72; background:rgba(29,186,114,.1); animation:revealPop .4s ease; }
@keyframes revealPop { 0%{transform:scale(1)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }
.hint-bar { background:rgba(0,0,0,.8); border:1px solid rgba(37,244,238,.3); border-radius:12px; padding:8px 20px; color:#25f4ee; font-size:15px; max-width:500px; text-align:center; }
#winner-popup { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .5s; }
#winner-popup.show { opacity:1; }
.winner-card { background:rgba(0,0,0,.9); border:3px solid #ffd700; border-radius:28px; padding:36px 52px; text-align:center; animation:popIn .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }
.winner-label { font-size:16px; color:#aaa; margin-bottom:8px; }
.winner-name { font-size:32px; font-weight:900; color:#ffd700; }
.winner-word { font-size:18px; color:#1dba72; margin-top:8px; }
.confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; animation:confettiFall linear forwards; pointer-events:none; z-index:200; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div id="container">
  <div class="title-bar">🔐 كلمة السر</div>
  <div class="letters" id="letters"></div>
  <div class="hint-bar" id="hint-bar" style="display:none"></div>
</div>
<div id="winner-popup">
  <div class="winner-card">
    <div class="winner-label">🏆 الفائز</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-word" id="winner-word"></div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
let username = params.get('username') || '';
const authKey = params.get('key') || '';
const socket = io();

if (!username && authKey) {
  fetch('/api/resolve-key?key=' + encodeURIComponent(authKey)).then(r=>r.json()).then(data => {
    if (data.ok && data.username) { username = data.username; socket.emit('join',{username}); loadState(); }
    else if (data.ok && data.connectedRooms?.length) { username = data.connectedRooms[0]; socket.emit('join',{username}); loadState(); }
  });
} else if (username) { socket.emit('join',{username}); loadState(); }

function loadState() {
  fetch(`/api/password/${username}`).then(r=>r.json()).then(data => {
    if (data.length > 0) { document.getElementById('container').style.display='flex'; renderLetters(data.letters, data.revealed); renderHint(data.hints); }
  });
}

socket.on('password:update', (data) => {
  document.getElementById('container').style.display = 'flex';
  renderLetters(data.letters, data.revealed);
  renderHint(data.hints);
});

socket.on('password:winner', ({ winner, word }) => {
  document.getElementById('winner-name').textContent = winner.name;
  document.getElementById('winner-word').textContent = '✅ ' + word;
  document.getElementById('winner-popup').classList.add('show');
  launchConfetti();
  setTimeout(() => document.getElementById('winner-popup').classList.remove('show'), 6000);
});

function renderLetters(letters, revealed) {
  document.getElementById('letters').innerHTML = letters.map((l, i) =>
    `<div class="letter ${revealed[i]?'revealed':''}">${l==='_'?'؟':l}</div>`
  ).join('');
}

function renderHint(hints) {
  const bar = document.getElementById('hint-bar');
  if (hints && hints.length > 0) { bar.style.display='block'; bar.textContent='💡 '+hints[hints.length-1]; }
  else { bar.style.display='none'; }
}

function launchConfetti() {
  const colors = ['#ff0050','#25f4ee','#ffd700','#1dba72','#a57afa','#f59e0b'];
  for (let i=0; i<60; i++) {
    const el = document.createElement('div'); el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),4000);
  }
}
</script>
</body>
</html>
