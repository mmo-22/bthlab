<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><title>Knockout Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body.mobile{transform:scale(0.55);transform-origin:center center}
html,body{background:transparent;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.box{display:none;background:rgba(0,0,0,.92);border:2px solid rgba(255,255,255,.12);border-radius:22px;padding:28px 32px;width:520px;text-align:center;position:relative;overflow:hidden}
.box.show{display:block;animation:popIn .4s ease}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.title{font-size:18px;font-weight:900;color:#ff6b9d;margin-bottom:4px}
.subtitle{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px}
.count-big{font-size:56px;font-weight:900;color:#fff}
.count-label{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:12px}
.keyword-hint{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:8px}
.keyword-hint strong{color:#ff6b9d}
.question-box{background:rgba(255,255,255,.06);border-radius:14px;padding:18px;margin:12px 0}
.q-text{font-size:18px;font-weight:900;color:#fff;margin-bottom:14px}
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:right}
.q-opt{padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);font-size:14px;color:#fff;display:flex;align-items:center;gap:8px}
.q-opt .num{min-width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.q-opt.correct{border-color:#1dba72;background:rgba(29,186,114,.12)}
.q-opt.correct .num{background:#1dba72;color:#000}
.q-opt.wrong{border-color:#ef4444;background:rgba(239,68,68,.08);opacity:.5}
.round-badge{font-size:12px;font-weight:700;color:#ffd700;margin-bottom:8px}
.alive-bar{height:8px;background:rgba(255,255,255,.06);border-radius:99px;margin:8px 0;overflow:hidden}
.alive-fill{height:100%;background:linear-gradient(90deg,#1dba72,#25f4ee);border-radius:99px;transition:width .5s}
.elim-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:8px}
.elim-name{padding:3px 10px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(239,68,68,.12);color:#fca5a5;text-decoration:line-through;animation:fadeSlide .4s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.winner-banner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.95);border-radius:22px;z-index:10;animation:popIn .5s ease}
.winner-banner.hide{display:none}
.winner-emoji{font-size:48px;margin-bottom:8px}
.winner-text{font-size:28px;font-weight:900;color:#ffd700}
.winner-sub{font-size:14px;color:rgba(255,255,255,.5);margin-top:4px}
.progress-text{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px}
.confetti{position:fixed;width:10px;height:10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:200}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="title">🏆 بطولة الخروج</div>
  <div class="subtitle" id="subtitle">في انتظار البدء...</div>
  <div class="count-big" id="count">0</div>
  <div class="count-label" id="count-label">لاعب</div>
  <div class="keyword-hint" id="keyword-hint" style="display:none">اكتب <strong id="kw-text">بطولة</strong> للمشاركة</div>
  <div class="alive-bar"><div class="alive-fill" id="alive-fill" style="width:100%"></div></div>
  <div class="round-badge" id="round-badge"></div>
  <div class="question-box" id="q-box" style="display:none">
    <div class="q-text" id="q-text"></div>
    <div class="q-options" id="q-options"></div>
  </div>
  <div class="progress-text" id="progress"></div>
  <div class="elim-row" id="elim-row"></div>
  <div class="winner-banner hide" id="winner-banner">
    <div class="winner-emoji">🏆</div>
    <div class="winner-text" id="winner-text"></div>
    <div class="winner-sub">الفائز بالبطولة!</div>
  </div>
</div>
<script>
if(new URLSearchParams(location.search).get('mobile')==='1')document.body.classList.add('mobile');
const params=new URLSearchParams(location.search);
let username=params.get('username')||'';
const authKey=params.get('key')||'';
const socket=io({transports:['websocket','polling'],reconnection:true});
let totalPlayers=0;

if(!username&&authKey){fetch('/api/resolve-key?key='+encodeURIComponent(authKey)).then(r=>r.json()).then(d=>{if(d.ok&&d.username)username=d.username;else if(d.ok&&d.connectedRooms?.length)username=d.connectedRooms[0];if(username){socket.emit('join',{username});load();}});}
else if(username){socket.emit('join',{username});load();}

function load(){fetch(`/api/knockout/${username}`).then(r=>r.json()).then(d=>{if(d.phase!=='idle'){document.getElementById('box').classList.add('show');document.getElementById('count').textContent=d.aliveCount;totalPlayers=d.playerCount;updateBar(d.aliveCount,d.playerCount);}});}

function updateBar(alive,total){
  if(!total)total=totalPlayers||1;
  document.getElementById('alive-fill').style.width=(alive/total*100)+'%';
}

function confetti(){const c=['#ff6b9d','#ffd700','#25f4ee','#1dba72','#a57afa','#ff0050'];for(let i=0;i<50;i++){const el=document.createElement('div');el.className='confetti';el.style.cssText=`left:${Math.random()*100}vw;background:${c[Math.floor(Math.random()*c.length)]};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}}

socket.on('knockout:register',d=>{
  document.getElementById('box').classList.add('show');
  document.getElementById('subtitle').textContent='التسجيل مفتوح';
  document.getElementById('keyword-hint').style.display='block';
  document.getElementById('kw-text').textContent=d.keyword||'بطولة';
  document.getElementById('count').textContent='0';
  document.getElementById('count-label').textContent='لاعب';
  document.getElementById('q-box').style.display='none';
  document.getElementById('elim-row').innerHTML='';
  document.getElementById('winner-banner').classList.add('hide');
  document.getElementById('round-badge').textContent='';
});

socket.on('knockout:joined',d=>{
  document.getElementById('count').textContent=d.count;
  document.getElementById('count-label').textContent=d.count+'/'+d.max+' لاعب';
  totalPlayers=d.count;
});

socket.on('knockout:locked',d=>{
  document.getElementById('subtitle').textContent='البطولة بدأت!';
  document.getElementById('keyword-hint').style.display='none';
  document.getElementById('count').textContent=d.count;
  totalPlayers=d.count;
  updateBar(d.count,d.count);
});

socket.on('knockout:question',d=>{
  document.getElementById('q-box').style.display='block';
  document.getElementById('q-text').textContent=d.question;
  document.getElementById('round-badge').textContent='⚡ الجولة '+d.round;
  document.getElementById('q-options').innerHTML=(d.options||[]).map((o,i)=>'<div class="q-opt" id="opt-'+i+'"><span class="num">'+(i+1)+'</span>'+o+'</div>').join('');
  document.getElementById('progress').textContent='⏱ '+d.answerTime+' ثانية';
  document.getElementById('count').textContent=d.alivePlayers;
  updateBar(d.alivePlayers,totalPlayers);
});

socket.on('knockout:answered',d=>{
  document.getElementById('progress').textContent='📝 '+d.count+'/'+d.total+' جاوبوا';
});

socket.on('knockout:reveal',d=>{
  // Highlight correct/wrong
  (document.querySelectorAll('.q-opt')||[]).forEach((el,i)=>{
    if(i===d.correct)el.classList.add('correct');
    else el.classList.add('wrong');
  });
  // Show eliminated
  (d.eliminated||[]).forEach(e=>{
    const tag=document.createElement('span');tag.className='elim-name';tag.textContent=e.name;
    document.getElementById('elim-row').appendChild(tag);
  });
  document.getElementById('count').textContent=d.aliveCount;
  updateBar(d.aliveCount,totalPlayers);
  // Winner
  if(d.winner){
    document.getElementById('winner-banner').classList.remove('hide');
    document.getElementById('winner-text').textContent=d.winner.name;
    confetti();
  }
});

socket.on('knockout:stopped',()=>{
  document.getElementById('box').classList.remove('show');
});
</script>
</body>
</html>
