<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Word War Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
:root{--scale:1}
.main-box{position:relative;background:rgba(0,0,0,.92);border:2px solid rgba(255,255,255,.12);border-radius:22px;padding:calc(20px * var(--scale)) calc(24px * var(--scale));width:calc(700px * var(--scale));min-height:calc(400px * var(--scale));opacity:0;pointer-events:none;transition:opacity .15s;overflow:visible}
.main-box.show{opacity:1}

.game-title{font-size:calc(18px * var(--scale));color:rgba(255,255,255,.5);text-align:center;margin-bottom:calc(6px * var(--scale))}
.game-title span{font-weight:900}
.game-title .red{color:#ef4444}
.game-title .blue{color:#3b82f6}

.category-bar{text-align:center;font-size:calc(22px * var(--scale));font-weight:900;color:#fbbf24;margin-bottom:calc(14px * var(--scale));padding:calc(8px * var(--scale));background:rgba(251,191,36,.08);border-radius:10px;border:1px solid rgba(251,191,36,.2)}

.scoreboard{display:flex;align-items:center;justify-content:center;gap:calc(16px * var(--scale));margin-bottom:calc(14px * var(--scale))}
.team-score{flex:1;text-align:center;padding:calc(12px * var(--scale));border-radius:14px;position:relative;overflow:hidden}
.team-score.red{background:rgba(239,68,68,.12);border:2px solid rgba(239,68,68,.4)}
.team-score.blue{background:rgba(59,130,246,.12);border:2px solid rgba(59,130,246,.4)}
.team-label{font-size:calc(13px * var(--scale));font-weight:700;margin-bottom:calc(4px * var(--scale))}
.team-score.red .team-label{color:#ef4444}
.team-score.blue .team-label{color:#3b82f6}
.team-num{font-size:calc(42px * var(--scale));font-weight:900;color:#fff;line-height:1}
.score-vs{font-size:calc(18px * var(--scale));font-weight:900;color:rgba(255,255,255,.3)}
.score-bar-wrap{height:calc(8px * var(--scale));background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;display:flex;margin-bottom:calc(14px * var(--scale))}
.score-bar-red{height:100%;background:linear-gradient(90deg,#ef4444,#f87171);transition:width .5s ease;border-radius:99px 0 0 99px;min-width:2px}
.score-bar-blue{height:100%;background:linear-gradient(90deg,#60a5fa,#3b82f6);transition:width .5s ease;border-radius:0 99px 99px 0;min-width:2px}

.words-area{display:flex;gap:calc(10px * var(--scale));margin-bottom:calc(14px * var(--scale));height:calc(180px * var(--scale))}
.words-col{flex:1;border-radius:12px;padding:calc(8px * var(--scale));height:100%;overflow:hidden}
.words-col.red{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15)}
.words-col.blue{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15)}
.word-chip{display:inline-block;padding:calc(3px * var(--scale)) calc(10px * var(--scale));margin:calc(2px * var(--scale));border-radius:20px;font-size:calc(12px * var(--scale));font-weight:700;animation:chipPop .3s cubic-bezier(0.34,1.56,0.64,1)}
.words-col.red .word-chip{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
.words-col.blue .word-chip{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
@keyframes chipPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes joinPop{0%{transform:translateX(-50%) translateY(-20px) scale(.8);opacity:0}100%{transform:translateX(-50%) translateY(0) scale(1);opacity:1}}

.timer-row{display:flex;justify-content:center;align-items:center;gap:calc(10px * var(--scale));margin-bottom:calc(12px * var(--scale))}
.timer-circle{width:calc(64px * var(--scale));height:calc(64px * var(--scale));position:relative}
.timer-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-bg{fill:none;stroke:rgba(255,255,255,.1);stroke-width:4}
.timer-fg{fill:none;stroke:#fbbf24;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .95s linear,stroke .3s}
.timer-fg.warn{stroke:#f59e0b}
.timer-fg.danger{stroke:#ff0050}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:calc(22px * var(--scale));font-weight:900;color:#fff}

.result-banner{display:none;text-align:center;padding:calc(16px * var(--scale));border-radius:14px;margin-bottom:calc(10px * var(--scale))}
.result-banner.show{display:block;animation:chipPop .5s cubic-bezier(0.34,1.56,0.64,1)}
.result-banner.red-win{background:rgba(239,68,68,.15);border:2px solid rgba(239,68,68,.4)}
.result-banner.blue-win{background:rgba(59,130,246,.15);border:2px solid rgba(59,130,246,.4)}
.result-banner.tie{background:rgba(251,191,36,.15);border:2px solid rgba(251,191,36,.4)}
.result-text{font-size:calc(24px * var(--scale));font-weight:900;color:#fff}
.result-sub{font-size:calc(13px * var(--scale));color:rgba(255,255,255,.5);margin-top:calc(4px * var(--scale))}

.feed{position:absolute;bottom:calc(8px * var(--scale));left:calc(12px * var(--scale));right:calc(12px * var(--scale));display:flex;flex-direction:column;gap:calc(3px * var(--scale))}
.feed-item{font-size:calc(11px * var(--scale));padding:calc(3px * var(--scale)) calc(8px * var(--scale));border-radius:6px;animation:chipPop .3s ease;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-item.red{background:rgba(239,68,68,.1);color:#fca5a5}
.feed-item.blue{background:rgba(59,130,246,.1);color:#93c5fd}

.confetti-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden}
</style>
</head>
<body>
<div class="main-box" id="box">
  <div class="game-title">⚔️ <span class="red">حرب</span> <span class="blue">الكلمات</span></div>
  <div class="category-bar" id="category">—</div>
  <div id="join-keywords" style="display:none;text-align:center;font-size:calc(13px * var(--scale));margin-bottom:calc(10px * var(--scale));color:rgba(255,255,255,.6);font-weight:500"></div>
  <div class="scoreboard">
    <div class="team-score red">
      <div class="team-label">🔴 الفريق الأحمر</div>
      <div class="team-num" id="red-score">0</div>
    </div>
    <div class="score-vs">VS</div>
    <div class="team-score blue">
      <div class="team-label">🔵 الفريق الأزرق</div>
      <div class="team-num" id="blue-score">0</div>
    </div>
  </div>
  <div class="score-bar-wrap">
    <div class="score-bar-red" id="bar-red" style="width:50%"></div>
    <div class="score-bar-blue" id="bar-blue" style="width:50%"></div>
  </div>
  <div class="words-area">
    <div class="words-col red" id="red-words"></div>
    <div class="words-col blue" id="blue-words"></div>
  </div>
  <div class="timer-row" id="timer-row">
    <div class="timer-circle">
      <svg viewBox="0 0 100 100">
        <circle class="timer-bg" cx="50" cy="50" r="42"></circle>
        <circle class="timer-fg" id="timer-fg" cx="50" cy="50" r="42" stroke-dasharray="263.89" stroke-dashoffset="0"></circle>
      </svg>
      <div class="timer-text" id="timer-text">60</div>
    </div>
  </div>
  <div class="result-banner" id="result-banner">
    <div class="result-text" id="result-text"></div>
    <div class="result-sub" id="result-sub"></div>
  </div>
  <div class="confetti-layer" id="confetti-layer"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const cfg = { username: params.get('username') || '' };
const socket = io({ transports:['websocket','polling'], reconnection:true });
const CIRCLE = 263.89;
let timerInt = null, endTime = 0, totalDuration = 60;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function joinRoom() {
  if (!cfg.username) return;
  socket.emit('join', { username: cfg.username });
  fetch(`/api/word-war/${cfg.username}`).then(r=>r.json()).then(d => {
    if (d.active) {
      document.getElementById('category').textContent = d.category;
      updateScores(d.redScore, d.blueScore);
      renderWords('red', d.redWords || []);
      renderWords('blue', d.blueWords || []);
      const remMs = Math.max(0, d.endTime - Date.now());
      startTimer(Math.ceil(remMs/1000), d.duration);
      document.getElementById('box').classList.add('show');
    }
  });
}
socket.on('connect', joinRoom);
joinRoom();

socket.on('word-war:start', ({ category, duration, redKeyword, blueKeyword, redScore, blueScore }) => {
  playerWordCounts = {}; // reset per-round counts
  document.getElementById('category').textContent = category;
  document.getElementById('red-score').textContent = redScore || '0';
  document.getElementById('blue-score').textContent = blueScore || '0';
  document.getElementById('red-words').innerHTML = '';
  document.getElementById('blue-words').innerHTML = '';
  document.getElementById('result-banner').classList.remove('show','red-win','blue-win','tie');
  updateScores(redScore || 0, blueScore || 0);
  // Show join keywords
  const kw = document.getElementById('join-keywords');
  if (kw) {
    kw.innerHTML = '<span style="color:#fca5a5">🔴 اكتب "' + esc(redKeyword||'أحمر') + '"</span> — <span style="color:#93c5fd">🔵 اكتب "' + esc(blueKeyword||'أزرق') + '"</span>';
    kw.style.display = 'block';
  }
  totalDuration = duration;
  startTimer(duration, duration);
  document.getElementById('box').classList.add('show');
});

var playerWordCounts = {}; // track words per player per round

socket.on('word-war:word', ({ team, word, player, redScore, blueScore }) => {
  updateScores(redScore, blueScore);
  const col = document.getElementById(team + '-words');
  if (!playerWordCounts[player]) playerWordCounts[player] = 0;
  playerWordCounts[player]++;
  const chip = document.createElement('span');
  chip.className = 'word-chip';
  chip.innerHTML = word + ' <small style="opacity:.6;font-size:10px">(' + player + ' #' + playerWordCounts[player] + ')</small>';
  col.prepend(chip);
  while (col.children.length > 5) col.removeChild(col.lastChild);
});

socket.on('word-war:join', ({ team, player, redCount, blueCount }) => {
  document.querySelector('.team-score.red .team-label').textContent = '🔴 الأحمر (' + redCount + ')';
  document.querySelector('.team-score.blue .team-label').textContent = '🔵 الأزرق (' + blueCount + ')';
  // Show registration confirmation
  showJoinConfirm(team, player);
});

function showJoinConfirm(team, name) {
  var existing = document.getElementById('join-confirm');
  if (existing) existing.remove();
  var div = document.createElement('div');
  div.id = 'join-confirm';
  var bgColor = team === 'red' ? 'rgba(239,68,68,.9)' : 'rgba(59,130,246,.9)';
  var emoji = team === 'red' ? '🔴' : '🔵';
  div.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:' + bgColor + ';color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:200;animation:joinPop .4s ease;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)';
  div.textContent = emoji + ' ' + name + ' انضم!';
  document.body.appendChild(div);
  setTimeout(function() { if (div.parentNode) div.remove(); }, 2500);
}

socket.on('word-war:registration', ({ open, redKeyword, blueKeyword }) => {
  const kw = document.getElementById('join-keywords');
  if (open && kw) {
    kw.innerHTML = '📝 سجل الآن! — <span style="color:#fca5a5">🔴 اكتب "' + esc(redKeyword) + '"</span> أو <span style="color:#93c5fd">🔵 اكتب "' + esc(blueKeyword) + '"</span>';
    kw.style.display = 'block';
    kw.style.color = '#1dba72';
    kw.style.fontSize = 'calc(15px * var(--scale))';
    document.getElementById('category').textContent = '📝 مرحلة التسجيل';
    // Don't reset scores - keep them as they are
    document.getElementById('box').classList.add('show');
  }
});

socket.on('word-war:lock', ({ locked }) => {
  const kw = document.getElementById('join-keywords');
  if (kw) {
    if (locked) { kw.innerHTML = '🔒 التسجيل مقفل'; kw.style.color = '#ef4444'; }
    else { kw.style.color = 'rgba(255,255,255,.6)'; }
  }
});

socket.on('word-war:end', (result) => {
  stopTimer();
  const banner = document.getElementById('result-banner');
  const text = document.getElementById('result-text');
  const sub = document.getElementById('result-sub');
  banner.classList.remove('red-win','blue-win','tie');
  if (result.winner === 'red') {
    banner.classList.add('red-win');
    text.textContent = '🔴 الفريق الأحمر يفوز!';
  } else if (result.winner === 'blue') {
    banner.classList.add('blue-win');
    text.textContent = '🔵 الفريق الأزرق يفوز!';
  } else {
    banner.classList.add('tie');
    text.textContent = '🤝 تعادل!';
  }
  sub.textContent = `${result.redScore} - ${result.blueScore}`;
  banner.classList.add('show');
  fireConfetti();
});

socket.on('word-war:stopped', () => {
  stopTimer();
  document.getElementById('box').classList.remove('show');
});

function updateScores(r, b) {
  document.getElementById('red-score').textContent = r;
  document.getElementById('blue-score').textContent = b;
  const total = Math.max(1, r + b);
  document.getElementById('bar-red').style.width = (r / total * 100) + '%';
  document.getElementById('bar-blue').style.width = (b / total * 100) + '%';
}

function renderWords(team, words) {
  const col = document.getElementById(team + '-words');
  col.innerHTML = words.slice(-20).map(w => `<span class="word-chip">${esc(w)}</span>`).join('');
}

function startTimer(remaining, duration) {
  endTime = Date.now() + remaining * 1000;
  totalDuration = duration || remaining;
  if (timerInt) clearInterval(timerInt);
  updateTimer();
  timerInt = setInterval(updateTimer, 200);
}
function stopTimer() { if (timerInt) clearInterval(timerInt); timerInt = null; }
function updateTimer() {
  const remMs = Math.max(0, endTime - Date.now());
  const sec = Math.ceil(remMs / 1000);
  const fg = document.getElementById('timer-fg');
  const text = document.getElementById('timer-text');
  text.textContent = sec;
  const ratio = Math.max(0, Math.min(1, remMs / (totalDuration * 1000)));
  fg.style.strokeDashoffset = String(CIRCLE * (1 - ratio));
  fg.classList.remove('warn','danger');
  if (sec <= 5) fg.classList.add('danger');
  else if (sec <= 15) fg.classList.add('warn');
  if (remMs <= 0) { clearInterval(timerInt); timerInt = null; }
}

function fireConfetti() {
  const layer = document.getElementById('confetti-layer');
  const box = document.getElementById('box');
  const colors = ['#ef4444','#3b82f6','#fbbf24','#1dba72','#a855f7','#ec4899'];
  const cx = box.offsetWidth / 2, cy = box.offsetHeight / 2;
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;width:8px;height:12px;left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};border-radius:2px;`;
    layer.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 250;
    p.animate([
      { transform:'translate(0,0) rotate(0deg)', opacity:1 },
      { transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) rotate(${720+Math.random()*720}deg)`, opacity:0 }
    ], { duration:1500+Math.random()*500, easing:'cubic-bezier(0.4,0,0.6,1)' });
    setTimeout(() => p.remove(), 2100);
  }
}
</script>
</body>
</html>
