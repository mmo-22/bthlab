<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اشتراك — TikTok Live Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.14.0/moyasar.css">
<script src="https://cdn.moyasar.com/mpf/1.14.0/moyasar.js"></script>
<style>
  :root { --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24; --border:rgba(255,255,255,.08); --accent:#ff0050; --accent2:#25f4ee; --text:#f0f0f5; --muted:#666; --green:#1dba72; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .container { max-width:460px; width:100%; }
  .logo { text-align:center; margin-bottom:24px; }
  .logo h1 { font-size:24px; } .logo h1 span { color:var(--accent); }
  .logo p { color:var(--muted); font-size:13px; margin-top:4px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:16px; }
  .card-title { font-size:16px; font-weight:700; margin-bottom:16px; color:var(--accent2); }
  .price-box { text-align:center; padding:20px; background:var(--surface2); border-radius:12px; margin-bottom:20px; }
  .price { font-size:42px; font-weight:900; color:var(--accent2); }
  .price-unit { font-size:14px; color:var(--muted); }
  .features { list-style:none; margin-bottom:20px; }
  .features li { padding:8px 0; font-size:14px; color:var(--text); border-bottom:1px solid var(--border); }
  .features li:last-child { border:none; }
  .features li::before { content:'✅ '; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; padding:10px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:14px; }
  .mysr-form { margin-top:16px; }
  .back-link { text-align:center; margin-top:16px; }
  .back-link a { color:var(--muted); font-size:13px; text-decoration:none; }
  .back-link a:hover { color:var(--accent2); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🎯 TikTok Live <span>Reader</span></h1>
    <p>اشترك واحصل على فعاليات البث المباشر</p>
  </div>
  <div class="card">
    <div class="price-box">
      <div class="price">30 <span style="font-size:18px">ريال</span></div>
      <div class="price-unit">/ شهرياً</div>
    </div>
    <ul class="features">
      <li>فعالية العجلة (Wheel)</li>
      <li>دعم OBS و StreamLabs</li>
      <li>تحكم كامل من صفحة الإدارة</li>
      <li>اشتراك 30 يوم</li>
    </ul>
  </div>
  <div class="card">
    <div class="card-title">💳 معلومات الدفع</div>
    <div class="field">
      <label>الاسم</label>
      <input type="text" id="sub-name" placeholder="اسمك">
    </div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="sub-email" placeholder="email@example.com">
    </div>
    <div class="mysr-form"></div>
  </div>
  <div class="back-link">
    <a href="/login.html">عندك مفتاح؟ سجل دخول</a>
  </div>
</div>
<script>
Moyasar.init({
  element: '.mysr-form',
  amount: 3000,
  currency: 'SAR',
  description: 'TikTok Live Reader - اشتراك شهري',
  publishable_api_key: 'pk_test_K1YdX6c5X1vYvCByHN77jSxHkJikW9LvAnGmkcaM',
  callback_url: location.origin + '/payment-callback.html',
  methods: ['creditcard'],
  supported_networks: ['mada', 'visa', 'mastercard'],
  on_completed: async function(payment) {
    localStorage.setItem('pending_payment', JSON.stringify({
      id: payment.id,
      name: document.getElementById('sub-name').value.trim(),
      email: document.getElementById('sub-email').value.trim(),
    }));
  },
});
</script>
</body>
</html>
