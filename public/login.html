<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل دخول — TikTok Live Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0f; --surface:#111118; --surface2:#1a1a24; --border:rgba(255,255,255,.08); --accent:#ff0050; --accent2:#25f4ee; --text:#f0f0f5; --muted:#666; --green:#1dba72; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .container { max-width:420px; width:100%; }
  .logo { text-align:center; margin-bottom:28px; }
  .logo h1 { font-size:24px; } .logo h1 span { color:var(--accent); }
  .logo p { color:var(--muted); font-size:13px; margin-top:4px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 24px; }
  .tabs { display:flex; gap:6px; margin-bottom:20px; }
  .tab { flex:1; padding:10px; text-align:center; background:var(--surface2); border:1px solid var(--border); border-radius:10px; cursor:pointer; font-family:inherit; font-size:14px; font-weight:700; color:var(--muted); transition:all .15s; }
  .tab.active { background:var(--accent2); color:#000; border-color:var(--accent2); }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  .field input { width:100%; padding:12px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:inherit; font-size:16px; text-align:center; letter-spacing:2px; direction:ltr; }
  .field input:focus { border-color:var(--accent2); outline:none; }
  .btn { width:100%; padding:14px; border:none; border-radius:10px; font-family:inherit; font-size:16px; font-weight:700; cursor:pointer; transition:opacity .15s; }
  .btn:hover { opacity:.85; }
  .btn-sub { background:var(--accent2); color:#000; }
  .btn-owner { background:var(--accent); color:#fff; }
  .msg { text-align:center; margin-top:12px; font-size:13px; padding:10px; border-radius:8px; display:none; }
  .msg.error { display:block; background:rgba(239,68,68,.1); color:#ef4444; }
  .msg.success { display:block; background:rgba(29,186,114,.1); color:var(--green); }
  .links { text-align:center; margin-top:16px; }
  .links a { color:var(--muted); font-size:13px; text-decoration:none; }
  .links a:hover { color:var(--accent2); }
  #owner-tab-content { display:none; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🔑 TikTok Live <span>Reader</span></h1>
    <p>سجل دخول للوصول للفعاليات</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('sub')">🎫 مشترك</button>
      <button class="tab" onclick="switchTab('owner')">👑 مالك</button>
    </div>
    <div id="sub-tab-content">
      <div class="field">
        <label>مفتاح الاشتراك</label>
        <input type="text" id="sub-key" placeholder="TLR-XXXXXXXX" dir="ltr">
      </div>
      <button class="btn btn-sub" onclick="loginSub()">🔓 دخول</button>
      <div class="msg" id="sub-msg"></div>
    </div>
    <div id="owner-tab-content">
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="owner-pw" placeholder="••••••••">
      </div>
      <button class="btn btn-owner" onclick="loginOwner()">👑 دخول المالك</button>
      <div class="msg" id="owner-msg"></div>
    </div>
  </div>
  <div class="links">
    <a href="/subscribe.html">ما عندك اشتراك؟ اشترك الحين</a>
  </div>
</div>
<script>
function switchTab(t) {
  document.getElementById('sub-tab-content').style.display = t === 'sub' ? '' : 'none';
  document.getElementById('owner-tab-content').style.display = t === 'owner' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', i === (t==='sub'?0:1)));
}

// Check if already logged in
const savedKey = localStorage.getItem('subscription_key');
if (savedKey) document.getElementById('sub-key').value = savedKey;
const savedPw = localStorage.getItem('owner_password');
if (savedPw) document.getElementById('owner-pw').value = savedPw;

async function loginSub() {
  const key = document.getElementById('sub-key').value.trim();
  const msg = document.getElementById('sub-msg');
  if (!key) { msg.className = 'msg error'; msg.textContent = 'أدخل مفتاح الاشتراك'; return; }
  const res = await fetch('/api/validate-key?key=' + encodeURIComponent(key));
  const data = await res.json();
  if (data.valid) {
    localStorage.setItem('subscription_key', key);
    msg.className = 'msg success';
    msg.textContent = 'مرحباً ' + (data.name || '') + '! جاري التحويل...';
    setTimeout(() => {
      window.location.href = '/admin.html?mode=subscriber&key=' + encodeURIComponent(key);
    }, 1000);
  } else if (data.expired) {
    msg.className = 'msg error'; msg.textContent = 'انتهى اشتراكك — جدد الاشتراك';
  } else {
    msg.className = 'msg error'; msg.textContent = 'مفتاح غير صالح';
  }
}

async function loginOwner() {
  const pw = document.getElementById('owner-pw').value.trim();
  const msg = document.getElementById('owner-msg');
  if (!pw) { msg.className = 'msg error'; msg.textContent = 'أدخل كلمة المرور'; return; }
  const res = await fetch('/api/validate-owner', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw }),
  });
  const data = await res.json();
  if (data.valid) {
    localStorage.setItem('owner_password', pw);
    msg.className = 'msg success';
    msg.textContent = 'مرحباً بالمالك! جاري التحويل...';
    setTimeout(() => {
      window.location.href = '/admin.html?mode=owner&pw=' + encodeURIComponent(pw);
    }, 1000);
  } else {
    msg.className = 'msg error'; msg.textContent = 'كلمة المرور خاطئة';
  }
}

document.getElementById('sub-key').addEventListener('keydown', e => { if(e.key==='Enter') loginSub(); });
document.getElementById('owner-pw').addEventListener('keydown', e => { if(e.key==='Enter') loginOwner(); });
</script>
</body>
</html>
