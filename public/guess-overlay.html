<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><title>Guess Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body.mobile{transform:scale(0.55);transform-origin:center center}
html,body{background:transparent;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.box{display:none;background:rgba(0,0,0,.92);border:2px solid rgba(255,255,255,.12);border-radius:22px;padding:28px 32px;min-width:400px;text-align:center}
.box.show{display:block;animation:popIn .4s ease}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.title{font-size:16px;font-weight:900;color:#ffd700;margin-bottom:8px}
.hint{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px}
.letters{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.letter{width:44px;height:52px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:rgba(255,255,255,.3)}
.letter.revealed{border-color:#25f4ee;color:#25f4ee;background:rgba(37,244,238,.08)}
.winners{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.winner{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:10px;animation:popIn .3s ease}
.winner img{width:28px;height:28px;border-radius:50%}
.winner .rank{font-size:14px;font-weight:900;color:#ffd700;min-width:24px}
.winner .name{font-size:13px;font-weight:700;color:#fff}
.reveal-word{font-size:28px;font-weight:900;color:#25f4ee;margin:12px 0;animation:popIn .5s ease}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="title">🔮 خمن الكلمة</div>
  <div class="hint" id="hint"></div>
  <div class="letters" id="letters"></div>
  <div class="winners" id="winners"></div>
  <div class="reveal-word" id="reveal" style="display:none"></div>
</div>
<script>
if(new URLSearchParams(location.search).get('mobile')==='1')document.body.classList.add('mobile');
const params=new URLSearchParams(location.search);
let username=params.get('username')||'';
const authKey=params.get('key')||'';
const socket=io({transports:['websocket','polling'],reconnection:true});

if(!username&&authKey){fetch('/api/resolve-key?key='+encodeURIComponent(authKey)).then(r=>r.json()).then(d=>{if(d.ok&&d.username){username=d.username;}else if(d.ok&&d.connectedRooms?.length){username=d.connectedRooms[0];}if(username){socket.emit('join',{username});load();}});}
else if(username){socket.emit('join',{username});load();}

function load(){fetch(`/api/guess/${username}`).then(r=>r.json()).then(d=>{if(d.active){show(d);}});}

function show(d){
  document.getElementById('box').classList.add('show');
  document.getElementById('hint').textContent=d.hint?'💡 '+d.hint:'';
  document.getElementById('reveal').style.display='none';
  renderLetters(d.length,d.letters);
  renderWinners(d.winners||[]);
}

function renderLetters(len,letters){
  document.getElementById('letters').innerHTML=Array.from({length:len},(_,i)=>{
    const l=letters.find(x=>x.i===i);
    return '<div class="letter '+(l?'revealed':'')+'">'+( l?l.c:'؟')+'</div>';
  }).join('');
}

function renderWinners(winners){
  document.getElementById('winners').innerHTML=winners.map((w,i)=>
    '<div class="winner"><span class="rank">#'+(i+1)+'</span>'+(w.avatar?'<img src="'+w.avatar+'">':'')+'<span class="name">'+w.name+'</span></div>'
  ).join('');
}

socket.on('guess:started',d=>{show(d);});
socket.on('guess:won',d=>{renderWinners(d.winners||[]);});
socket.on('guess:reveal',d=>{
  document.getElementById('reveal').textContent=d.word;
  document.getElementById('reveal').style.display='block';
  renderLetters(d.word.length,d.word.split('').map((c,i)=>({i,c})));
});
socket.on('guess:stopped',()=>{document.getElementById('box').classList.remove('show');});
</script>
</body>
</html>
